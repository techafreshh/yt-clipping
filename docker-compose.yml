services:
  shorts:
    build: .
    container_name: shorts
    env_file: .env
    volumes:
      - ./raw:/app/raw
      - ./output:/app/output
      - ./transcripts:/app/transcripts
      - ./clips:/app/clips
    restart: unless-stopped
    networks:
      - web_gateway
    depends_on:
      - pot-provider

  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: pot-provider
    restart: unless-stopped
    networks:
      - web_gateway

networks:
  web_gateway:
    external: true
